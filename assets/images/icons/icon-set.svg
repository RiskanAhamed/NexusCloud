        <line x1="10" y1="28" x2="40" y2="28" stroke="#0a0a0f" opacity="0.3"/>
        <line x1="10" y1="36" x2="40" y2="36" stroke="#0a0a0f" opacity="0.3"/>
    </g>
    
    <!-- Cloud Icon -->
    <g transform="translate(250, 25)">
        <path d="M10 35 Q0 25 15 18 Q18 10 30 12 Q38 5 50 12 Q62 8 70 18 Q85 20 75 32 Q72 40 60 40 L20 40 Q10 40 10 35Z" fill="#f472b6"/>
