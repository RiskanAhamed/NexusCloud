<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100">
    <!-- Server Icon -->
    <g transform="translate(50, 25)">
        <rect x="0" y="0" width="50" height="50" rx="8" fill="#6366f1"/>
        <rect x="8" y="10" width="34" height="8" rx="2" fill="#0a0a0f" opacity="0.5"/>
        <rect x="8" y="22" width="34" height="8" rx="2" fill="#0a0a0f" opacity="0.5"/>
